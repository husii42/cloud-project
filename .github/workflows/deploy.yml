name: Build and Deploy to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

env:
  AZURE_WEBAPP_NAME: app-husi42firstwebapp-dev
  PYTHON_VERSION: "3.11"
  APP_DIRECTORY: "app"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.APP_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (catches syntax errors before deployment)
        working-directory: ${{ env.APP_DIRECTORY }}
        run: python -m py_compile app.py

      - name: Smoke-test Flask routes (no live Azure connection needed)
        working-directory: ${{ env.APP_DIRECTORY }}
        env:
          AZURE_STORAGE_ACCOUNT_NAME: "dummyaccountfortest"
          AZURE_STORAGE_CONTAINER_NAME: "images"
        run: |
          python -c "
          from app import app
          client = app.test_client()
          assert client.get('/healthz').status_code == 200
          assert client.get('/upload').status_code == 200
          assert client.get('/').status_code == 200
          print('Smoke tests passed.')
          "

      - name: Package application
        working-directory: ${{ env.APP_DIRECTORY }}
        run: zip -r ../release.zip . -x "*.pyc" "__pycache__/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release.zip

      - name: Azure logout
        if: always()
        run: az logout

  verify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to warm up
        run: sleep 30

      - name: Check health endpoint
        run: |
          url="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz"
          echo "Checking $url"
          status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
          echo "Status: $status"
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
          echo "Deployment verified successfully."